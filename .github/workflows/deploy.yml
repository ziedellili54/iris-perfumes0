name: 🚀 Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Security check job
  security-check:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔍 Check for sensitive files
        run: |
          echo "Checking for sensitive files..."
          
          # List of files that should NEVER be in the repository
          SENSITIVE_FILES=(
            ".env"
            ".env.local"
            ".env.production"
            "firebase-admin-key.json"
            "serviceAccountKey.json"
            "secrets.json"
            "credentials.json"
          )
          
          FOUND_SENSITIVE=0
          
          for file in "${SENSITIVE_FILES[@]}"; do
            if [ -f "$file" ]; then
              echo "❌ ERROR: Sensitive file found: $file"
              FOUND_SENSITIVE=1
            fi
          done
          
          if [ $FOUND_SENSITIVE -eq 1 ]; then
            echo "❌ SECURITY VIOLATION: Sensitive files detected!"
            echo "These files contain secrets and should NOT be committed."
            echo "Add them to .gitignore immediately."
            exit 1
          fi
          
          echo "✅ No sensitive files detected"

      - name: 🔍 Check for hardcoded secrets
        run: |
          echo "Scanning for potential hardcoded secrets..."
          
          # Scan for common patterns (basic check)
          if grep -r "password.*=.*['\"].*['\"]" --include="*.html" --include="*.js" .; then
            echo "⚠️  WARNING: Possible hardcoded password found"
          fi
          
          if grep -r "api[_-]?key.*=.*['\"].*['\"]" --include="*.html" --include="*.js" .; then
            echo "⚠️  WARNING: Possible hardcoded API key found"
          fi
          
          echo "✅ Basic secret scan complete"

  # Build and deploy job
  deploy:
    needs: security-check
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Pages
        uses: actions/configure-pages@v4

      - name: 📦 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Deployment complete
        run: |
          echo "═════════════════════════════════════════"
          echo "✅ Deployment successful!"
          echo "═════════════════════════════════════════"
          echo "Your site is now live at:"
          echo "${{ steps.deployment.outputs.page_url }}"
          echo "═════════════════════════════════════════"
